<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Presensi Siswa</title>
    <!-- Menggunakan Tailwind CSS untuk styling yang cepat dan modern -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        /* Animasi transisi antar halaman */
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center p-4">

    <!-- Container Utama -->
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden relative">
        
        <!-- Header -->
        <div class="bg-indigo-600 p-6 text-center text-white">
            <h1 class="text-2xl font-bold">Portal Presensi</h1>
            <p class="text-indigo-200 text-sm mt-1">Sistem Kehadiran Siswa Terpadu</p>
        </div>

        <div class="p-6">
            <form id="presensiForm">
                
                <!-- HALAMAN 1: Identitas -->
                <div id="step1" class="fade-in block">
                    <div class="mb-4">
                        <label for="nama" class="block text-sm font-medium text-gray-700 mb-1">Nama Lengkap</label>
                        <input type="text" id="nama" name="nama" placeholder="Masukkan nama lengkapmu..." class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition" required>
                    </div>

                    <div class="mb-6">
                        <label for="kelas" class="block text-sm font-medium text-gray-700 mb-1">Kelas</label>
                        <select id="kelas" name="kelas" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition bg-white" required>
                            <option value="" disabled selected>Pilih Kelas...</option>
                            <!-- Opsi kelas akan di-generate oleh JS -->
                        </select>
                    </div>

                    <button type="button" onclick="nextStep()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-lg transition duration-200">
                        Lanjut
                    </button>
                </div>

                <!-- HALAMAN 2: Status Kehadiran -->
                <div id="step2" class="fade-in hidden">
                    <!-- Info Siswa -->
                    <div class="bg-gray-50 p-4 rounded-lg mb-6 border border-gray-100">
                        <p class="text-xs text-gray-500 uppercase font-semibold"> SisDatawa</p>
                        <p id="displayNama" class="text-lg font-bold text-gray-800 mt-1">-</p>
                        <p id="displayKelas" class="text-sm text-indigo-600 font-medium">-</p>
                    </div>

                    <!-- Pilihan Status -->
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Status Kehadiran</label>
                        <div class="grid grid-cols-3 gap-3">
                            <label class="cursor-pointer">
                                <input type="radio" name="status" value="Hadir" class="peer sr-only" onchange="toggleAlasan()" required>
                                <div class="text-center px-2 py-2 border border-gray-300 rounded-lg peer-checked:bg-green-500 peer-checked:text-white peer-checked:border-green-500 transition hover:bg-gray-50">
                                    Hadir
                                </div>
                            </label>
                            <label class="cursor-pointer">
                                <input type="radio" name="status" value="Izin" class="peer sr-only" onchange="toggleAlasan()">
                                <div class="text-center px-2 py-2 border border-gray-300 rounded-lg peer-checked:bg-yellow-500 peer-checked:text-white peer-checked:border-yellow-500 transition hover:bg-gray-50">
                                    Izin
                                </div>
                            </label>
                            <label class="cursor-pointer">
                                <input type="radio" name="status" value="Sakit" class="peer sr-only" onchange="toggleAlasan()">
                                <div class="text-center px-2 py-2 border border-gray-300 rounded-lg peer-checked:bg-red-500 peer-checked:text-white peer-checked:border-red-500 transition hover:bg-gray-50">
                                    Sakit
                                </div>
                            </label>
                        </div>
                    </div>

                    <!-- Alasan (Sembunyi by default) -->
                    <div id="alasanContainer" class="mb-6 hidden fade-in">
                        <label for="alasan" class="block text-sm font-medium text-gray-700 mb-1">Masukkan Alasan (Wajib)</label>
                        <textarea id="alasan" name="alasan" rows="3" placeholder="Tulis alasan tidak hadir di sini..." class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition"></textarea>
                    </div>

                    <!-- Tombol Action -->
                    <div class="flex gap-3">
                        <button type="button" onclick="prevStep()" class="w-1/3 bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold py-2.5 rounded-lg transition duration-200">
                            Kembali
                        </button>
                        <button type="submit" id="btnSubmit" class="w-2/3 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-lg transition duration-200 flex justify-center items-center">
                            <span>Submit Presensi</span>
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loading" class="fixed inset-0 bg-black bg-opacity-50 hidden flex justify-center items-center z-50">
        <div class="bg-white p-5 rounded-lg shadow-lg flex items-center gap-3">
            <svg class="animate-spin h-5 w-5 text-indigo-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span class="font-medium text-gray-700">Menyimpan data...</span>
        </div>
    </div>

    <script>
        // GANTI URL DI BAWAH INI DENGAN URL WEB APP GOOGLE APPS SCRIPT-MU!
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzPxYdftozNW7L3cxtYmw_1r_VDNPom74nAmVT-abbHd9JMY1ozmLBh8wuTOfWTiN9s/exec'; 

        // 1. Generate Opsi Kelas Otomatis
        document.addEventListener('DOMContentLoaded', () => {
            const classSelect = document.getElementById('kelas');
            const levels = ['X', 'XI', 'XII'];
            
            levels.forEach(level => {
                for(let i = 1; i <= 14; i++) {
                    let option = document.createElement('option');
                    option.value = `${level}-${i}`;
                    option.textContent = `${level}-${i}`;
                    classSelect.appendChild(option);
                }
            });
        });

        // 2. Logika Navigasi Halaman
        function nextStep() {
            const nama = document.getElementById('nama').value.trim();
            const kelas = document.getElementById('kelas').value;

            if(!nama || !kelas) {
                alert('Nama dan Kelas harus diisi terlebih dahulu!');
                return;
            }

            // Tampilkan data di Halaman 2
            document.getElementById('displayNama').textContent = nama;
            document.getElementById('displayKelas').textContent = 'Kelas: ' + kelas;

            // Switch Div
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step1').classList.remove('block');
            document.getElementById('step2').classList.remove('hidden');
            document.getElementById('step2').classList.add('block');
        }

        function prevStep() {
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('step2').classList.remove('block');
            document.getElementById('step1').classList.remove('hidden');
            document.getElementById('step1').classList.add('block');
        }

        // 3. Logika Radio Button & Textarea Alasan
        function toggleAlasan() {
            const status = document.querySelector('input[name="status"]:checked').value;
            const alasanContainer = document.getElementById('alasanContainer');
            const alasanInput = document.getElementById('alasan');

            if(status === 'Izin' || status === 'Sakit') {
                alasanContainer.classList.remove('hidden');
                alasanInput.setAttribute('required', 'true');
            } else {
                alasanContainer.classList.add('hidden');
                alasanInput.removeAttribute('required');
                alasanInput.value = ''; // Reset alasan
            }
        }

        // 4. Logika Submit Data ke Google Sheets
        const form = document.getElementById('presensiForm');
        
        form.addEventListener('submit', e => {
            e.preventDefault(); // Mencegah reload halaman
            
            // Validasi URL Script
            if(SCRIPT_URL === 'https://script.google.com/macros/s/AKfycbzPxYdftozNW7L3cxtYmw_1r_VDNPom74nAmVT-abbHd9JMY1ozmLBh8wuTOfWTiN9s/exec ') {
                alert('Tolong ganti SCRIPT_URL di dalam kode dengan URL dari Google Apps Script!');
                return;
            }

            // Tampilkan Loading
            document.getElementById('loading').classList.remove('hidden');

            // Ambil data dari form
            const formData = new FormData(form);

            fetch(SCRIPT_URL, { 
                method: 'POST', 
                body: formData 
            })
            .then(response => {
                // Sembunyikan Loading
                document.getElementById('loading').classList.add('hidden');
                
                // Notifikasi Sukses
                alert('Presensi berhasil dikirim! Terima kasih.');
                
                // Reset form ke awal
                form.reset();
                toggleAlasan(); // Reset tampilan alasan
                prevStep(); // Kembali ke halaman 1
            })
            .catch(error => {
                document.getElementById('loading').classList.add('hidden');
                alert('Terjadi kesalahan. Pastikan koneksi internet lancar.');
                console.error('Error!', error.message);
            });
        });
    </script>
</body>
</html>
